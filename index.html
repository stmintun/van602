<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #fff0f3; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; }
        .heart { font-size: 80px; cursor: pointer; transition: transform 0.3s; animation: beat 1.2s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        h1 { color: #ff4d6d; margin-top: 20px; font-size: 24px; padding: 0 20px; }
        #message { color: #590d22; font-size: 18px; margin-top: 15px; padding: 0 30px; min-height: 50px; }
        .btn { margin-top: 30px; padding: 10px 20px; background: #ff4d6d; color: white; border: none; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="heart" onclick="newLove()">❤️</div>
    <h1>For My Beautiful Wife</h1>
    <div id="message">Tap the heart for a surprise...</div>

    <script>
        const notes = [
            "You are my favorite person in the world! ❤️",
            "Coupon: One long hug on arrival home.",
            "Thinking of you makes my day better.",
            "Coupon: I'm picking up dessert tonight! 🍦",
            "You look stunning today.",
            "I'm so lucky to have you by my side."
        ];

        function newLove() {
            const msgDiv = document.getElementById('message');
            const randomNote = notes[Math.floor(Math.random() * notes.length)];
            msgDiv.innerText = randomNote;
        }
    </script>
</body>
</html>
